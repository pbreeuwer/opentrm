name: quotes

on:
  schedule:
    - cron: "*/10 * * * *"   # every 10 min (GitHub may add a few minutes of lag at busy times)
  workflow_dispatch:          # lets you run it manually from the Actions tab

permissions:
  contents: write

concurrency:
  group: quotes
  cancel-in-progress: true

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install --quiet yfinance

      - name: Fetch quotes
        run: python fetch_quotes.py

      - name: Commit if changed
        run: |
          git config user.name "quotes-bot"
          git config user.email "actions@users.noreply.github.com"
          git add docs/quotes.json
          git diff --cached --quiet || git commit -m "quotes $(date -u +'%Y-%m-%d %H:%M')"
          git push
